version: "3.9"
# Postgres uses POSTGRES_USER=telemetry on first init only. If you see "role telemetry does not exist",
# reset the volume: docker compose down -v && docker compose up -d postgres

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: telemetry
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  telemetry-collector:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://telemetry:telemetry@postgres:5432/telemetry?sslmode=disable
      POSTGRES_DSN: postgres://telemetry:telemetry@postgres:5432/telemetry?sslmode=disable
      WORKER_COUNT: 8
      QUEUE_BATCH_SIZE: 50
      POLL_INTERVAL: 2s
    depends_on:
      - postgres

volumes:
  pgdata:
