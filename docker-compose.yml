version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  telemetry-collector:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/telemetry?sslmode=disable
      WORKER_COUNT: 8
      QUEUE_BATCH_SIZE: 50
      POLL_INTERVAL: 2s
    depends_on:
      - postgres

volumes:
  pgdata:
