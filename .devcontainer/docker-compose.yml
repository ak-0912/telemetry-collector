version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  telemetry-collector:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspaces/telemetry-collector
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/telemetry?sslmode=disable
      WORKER_COUNT: 8
      QUEUE_BATCH_SIZE: 50
      POLL_INTERVAL: 2s
    depends_on:
      - postgres
    volumes:
      - ..:/workspaces/telemetry-collector:cached
    command: sleep infinity

volumes:
  pgdata:
  pgadmin-data:
