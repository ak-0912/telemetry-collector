version: "3.9"

services:
  telemetry-collector:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspaces/telemetry-collector
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORKER_COUNT: 8
      QUEUE_BATCH_SIZE: 50
      POLL_INTERVAL: 2s
      DATABASE_URL: ${DATABASE_URL:-postgres://telemetry:telemetry@host.docker.internal:5433/telemetry?sslmode=disable}
      PGPORT: "5433"
      PGUSER: telemetry
      PGPASSWORD: telemetry
      PGDATABASE: telemetry
    volumes:
      - ..:/workspaces/telemetry-collector:cached
    command: sleep infinity
